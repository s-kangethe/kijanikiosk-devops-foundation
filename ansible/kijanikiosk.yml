- hosts: all
  become: yes

  handlers:

    - name: restart payments
      systemd:
        name: kk-payments
        state: restarted
        daemon_reload: yes

  tasks:

    - name: Install required packages
      apt:
        name:
          - ufw
        update_cache: yes

    - name: Create payments service account
      user:
        name: kk-payments
        system: yes

    - name: Create application directories
      file:
        path: "{{ app_root }}/config"
        state: directory
        owner: kk-payments
        recurse: yes

    - name: Deploy payments systemd service
      template:
        src: kk-payments.service.j2
        dest: /etc/systemd/system/kk-payments.service
      notify: restart payments

    - name: Enable SSH firewall access
      ufw:
        rule: allow
        port: '22'

    - name: Enable firewall
      ufw:
        state: enabled

    - name: Enable persistent journald
      lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^Storage='
        line: Storage=persistent

    - name: Deploy logrotate configuration
      template:
        src: logrotate.j2
        dest: /etc/logrotate.d/kijanikiosk
